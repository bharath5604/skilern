name: Skilern
description: A global task bidding app for students and companies
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ">=3.10.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8

  # ============================================================
  # FIXED: Version downgraded to ^0.6.7 to match socket_io_client
  # ============================================================
  js: ^0.6.7

  # --- Real-Time Messaging & Updates ---
  socket_io_client: ^2.0.3

  # --- Media & PDF ---
  syncfusion_flutter_pdfviewer: ^28.1.37
  video_player: ^2.6.1
  chewie: ^1.5.0

  # --- Data Visualization ---
  fl_chart: ^0.69.0 

  # --- Firebase Ecosystem ---
  firebase_core: ^3.15.2
  firebase_messaging: ^15.0.0
  firebase_storage: ^12.0.0
  firebase_analytics: ^11.0.0

  # --- Notifications ---
  flutter_local_notifications: ^17.0.0

  # --- Networking & State ---
  http: ^1.2.1
  provider: ^6.1.2
  flutter_secure_storage: ^9.0.0
  shared_preferences: ^2.2.3

  # --- Payment Integration ---
  razorpay_flutter: ^1.3.5

  # --- File Handling & OS Integration ---
  file_picker: ^8.0.0
  url_launcher: ^6.3.0
  device_info_plus: ^10.0.0

  # --- Utilities & Security ---
  crypto: ^3.0.3
  intl: ^0.19.0

  # --- UI & Styling ---
  google_fonts: ^6.2.1  
  flutter_animate: ^4.5.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.2
  flutter_launcher_icons: ^0.14.0

flutter:
  uses-material-design: true

  assets:
    - assets/
    - assets/images/
    - assets/images/1.jpeg
    - assets/images/2.jpeg
    - assets/images/3.jpeg
    - assets/images/4.jpeg
    - assets/images/app_icon.png
    - assets/images/admin_payment_qr.png
    - assets/icons/app_icon.png

flutter_launcher_icons:
  android: true
  ios: true
  image_path: "assets/icons/app_icon.png"
  web:
    generate: true
    image_path: "assets/icons/app_icon.png"
    background_color: "#ffffff"
    theme_color: "#E53935"
  remove_alpha_ios: true