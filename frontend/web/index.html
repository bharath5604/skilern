<!DOCTYPE html>
<html>
<head>
  <!--
    If you are serving your web app in a path other than the root, change the
    href value below to reflect the base path you are serving from.
  -->
  <base href="$FLUTTER_BASE_HREF">

  <meta charset="UTF-8">
  <meta content="IE=Edge" http-equiv="X-UA-Compatible">
  <meta name="description" content="Skilern – A global task bidding app for students and companies.">

  <!-- iOS meta tags & icons -->
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black">
  <meta name="apple-mobile-web-app-title" content="Skilern">
  <link rel="apple-touch-icon" href="icons/app_icon.png">

  <!-- Favicon -->
  <link rel="icon" type="image/png" href="favicon.png?v=2"/>

  <title>Skilern</title>
  <link rel="manifest" href="manifest.json">

  <!-- ============================================================
       MODIFICATION: RAZORPAY WEB SDK
       This script is required to prevent MissingPluginException
       ============================================================ -->
  <script src="https://checkout.razorpay.com/v1/checkout.js"></script>
</head>
<body>
  <script>
    // Handling Firebase Cloud Messaging Service Worker
    if ('serviceWorker' in navigator) {
      window.addEventListener('load', async function () {
        try {
          // Note: ensure firebase-messaging-sw.js exists in your web/ folder
          await navigator.serviceWorker.register('/firebase-messaging-sw.js', {
            scope: '/firebase-cloud-messaging-push-scope',
          });
          console.log('Firebase messaging service worker registered');
        } catch (error) {
          console.error('Firebase messaging service worker registration failed:', error);
        }
      });
    }
  </script>

  <!-- Flutter Bootstrapper -->
  <script src="flutter_bootstrap.js" async></script>
</body>
</html>
