<!DOCTYPE html>
<html>
<head>
  <base href="$FLUTTER_BASE_HREF">

  <meta charset="UTF-8">
  <meta content="IE=Edge" http-equiv="X-UA-Compatible">
  <meta name="description" content="Skilern – A global task bidding app for students and companies.">

  <!-- iOS meta tags & icons -->
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black">
  <meta name="apple-mobile-web-app-title" content="Skilern">
  <link rel="apple-touch-icon" href="icons/app_icon.png">

  <!-- Favicon -->
  <link rel="icon" type="image/png" href="favicon.png?v=2"/>

  <title>Skilern</title>
  <link rel="manifest" href="manifest.json">

  <!-- ============================================================
       MODIFICATION: RAZORPAY WEB SDK
       Required for payment processing on the web platform.
       ============================================================ -->
  <script src="https://checkout.razorpay.com/v1/checkout.js"></script>

  <!-- ============================================================
       MODIFICATION: SYNCFUSION PDF RENDERER
       FIX: This script resolves the "PDF Rendering Failed" error 
       by providing the necessary JS engine for SfPdfViewer.
       ============================================================ -->
  <script src="https://cdn.syncfusion.com/sdk/js/purejs/syncfusion-pdf-js/24.1.41/syncfusion-pdf.js" type="text/javascript"></script>
</head>
<body>
  <script>
    // Handling Firebase Cloud Messaging Service Worker
    if ('serviceWorker' in navigator) {
      window.addEventListener('load', async function () {
        try {
          // Ensure firebase-messaging-sw.js exists in your web/ folder
          await navigator.serviceWorker.register('/firebase-messaging-sw.js', {
            scope: '/firebase-cloud-messaging-push-scope',
          });
          console.log('Firebase messaging service worker registered');
        } catch (error) {
          console.error('Firebase messaging service worker registration failed:', error);
        }
      });
    }
  </script>

  <!-- This script installs service_worker.js to provide PWA functionality to
       application. For more information, see:
       https://developers.google.com/web/fundamentals/primers/service-workers -->
  <script src="flutter.js" defer></script>
  
  <script>
    window.addEventListener('load', function(ev) {
      // Download main.dart.js
      _flutter.loader.loadEntrypoint({
        serviceWorker: {
          lastMetadataLayer: 0,
        },
        onEntrypointLoaded: function(engineInitializer) {
          engineInitializer.initializeEngine().then(function(appRunner) {
            appRunner.runApp();
          });
        }
      });
    });
  </script>
</body>
</html>
